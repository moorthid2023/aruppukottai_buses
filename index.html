<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aruppukottai Bus Time Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 class="heading">அருப்புக்கோட்டை பேருந்துகள்</h1>
    </header>
    <main>
      <table class="busTable">
        <h2 class="route">
          அருப்புக்கோட்டையிலிருந்து பந்தல்குடி, எட்டையாபுரம் வழியாக கோவில்பட்டி,
          திருநெல்வேலி, மற்றும் புதூர், நாகலாபுரம், விளாத்திகுளம் வேம்பார்
          வழியாக செல்லும் பேருந்துகள் 
        </h2>
        <thead>
          <tr>
            <th>பஸ் பெயர்</th>
            <th>ஊர்</th>
            <th>நேரம்</th>
            <th>தேர்வு செய்</th>
          </tr>
        </thead>
        <tbody class="busTableBody"></tbody>
      </table>
    </main>
    <footer></footer>
  </body>
  <script src="script.js"></script>
</html>
